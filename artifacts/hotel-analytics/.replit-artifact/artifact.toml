kind = "web"
previewPath = "/"
title = "Hotel Analytics"
version = "1.0.0"
id = "artifacts/hotel-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22465

[services.development]
run = "pnpm --filter @workspace/hotel-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-analytics", "run", "build" ]
publicDir = "artifacts/hotel-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22465"
BASE_PATH = "/"
